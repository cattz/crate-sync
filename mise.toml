[tasks.dev]
description = "Start API server in dev mode"
run = "pnpm exec tsx src/index.ts serve --debug"

[tasks."dev:web"]
description = "Start Vite frontend dev server"
dir = "web"
run = "pnpm dev --debug"

[tasks."dev:all"]
description = "Start API + frontend dev servers together"
depends = ["dev", "dev:web"]

[tasks.build]
description = "Build backend and frontend"
run = "pnpm build && cd web && pnpm build"

[tasks.preview]
description = "Build everything and run in production mode"
depends = ["build"]
run = "node dist/index.js serve"

[tasks.test]
description = "Run tests"
run = "pnpm test"

[tasks.lint]
description = "Type-check the project"
run = "pnpm exec tsc --noEmit"

[tasks."db:generate"]
description = "Generate DB migrations"
run = "pnpm exec drizzle-kit generate"

[tasks."db:migrate"]
description = "Run DB migrations"
run = "pnpm exec drizzle-kit migrate"
